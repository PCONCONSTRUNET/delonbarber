<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Delon Barber</title>
    <meta name="description" content="Delon Barber">
    <meta name="author" content="Lovable" />

    <!-- PWA / iOS push requirements -->
    <!-- Manifest is injected dynamically by src/main.tsx based on the URL path
         so /admin/* installs as a separate PWA from the client app. -->
    <script id="pwa-setup">
      (function() {
        const path = window.location.pathname.toLowerCase();
        const isAdmin = path.startsWith('/admin');
        const manifestPath = isAdmin ? '/admin.webmanifest' : '/client.webmanifest';
        const appTitle = isAdmin ? 'Delon Admin' : 'Delon Barber';
        
        // Inject manifest link
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestPath + '?v=' + Date.now();
        document.head.appendChild(link);
        
        // Inject apple title
        const meta = document.createElement('meta');
        meta.name = 'apple-mobile-web-app-title';
        meta.content = appTitle;
        document.head.appendChild(meta);

        // Update document title immediately
        if (isAdmin) document.title = appTitle;
      })();
    </script>
    <meta name="theme-color" content="#D62828" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/OneSignalSDKWorker.js')
            .then(reg => console.log('SW registered', reg))
            .catch(err => console.error('SW registration failed', err));
        });
      }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/X56c2lPSA8bMzTaLYhq79HVd4xg1/social-images/social-1768162789382-Red and Black Retro Barbershop Logo.png">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/X56c2lPSA8bMzTaLYhq79HVd4xg1/social-images/social-1768162789382-Red and Black Retro Barbershop Logo.png">

    <link rel="icon" type="image/png" href="https://storage.googleapis.com/gpt-engineer-file-uploads/X56c2lPSA8bMzTaLYhq79HVd4xg1/uploads/1768162783933-Red and Black Retro Barbershop Logo.png">
    <meta property="og:title" content="Delon Barber">
    <meta name="twitter:title" content="Delon Barber">
    <meta property="og:description" content="Delon Barber">
    <meta name="twitter:description" content="Delon Barber">
  </head>
